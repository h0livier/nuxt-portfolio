name: Test Action

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v7
    
      - name: Run your action
        id: test-action
        uses: h0livier/action-test@main
        with:
          name: "nuxt"

      - name: Print Output
        id: output
        run: echo "${{ steps.test-action.outputs.hello }}"